name: Generate vertical slice

on:
  workflow_dispatch:
    inputs:
      premise:
        description: Game premise (one sentence)
        required: false
        default: ''
        type: string
      modes:
        description: Input modes (comma-separated)
        required: false
        default: keyboard,touch,gamepad
        type: string
      concept_prompt:
        description: Pre-approved concept-art prompt (optional; if set, skips composition step)
        required: false
        default: ''
        type: string
      genre:
        description: Player-confirmed game genre (authoritative for the planner)
        required: false
        default: ''
        type: string
      mechanics:
        description: Player-confirmed gameplay loop (authoritative for the planner)
        required: false
        default: ''
        type: string
      phase:
        description: 'all | plan | build (default all)'
        required: false
        default: all
        type: string
      slug:
        description: Existing slug (required when phase=build)
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      slug: ${{ steps.run.outputs.slug }}
      committed: ${{ steps.commit.outputs.committed }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      MESHY_API_KEY: ${{ secrets.MESHY_API_KEY }}
      PLAYCANVAS_API_KEY: ${{ secrets.PLAYCANVAS_API_KEY }}
      PLAYCANVAS_PROJECT_ID: ${{ secrets.PLAYCANVAS_PROJECT_ID }}
      PLAYGEN_DISABLE_PLAYCANVAS_MCP: '1'
      PLAYGEN_PERMISSION_MODE: bypassPermissions
      PLAYWRIGHT_HEADLESS: 'true'
      PLAYGEN_CONCEPT_PROMPT: ${{ inputs.concept_prompt }}
      PLAYGEN_GENRE: ${{ inputs.genre }}
      PLAYGEN_MECHANICS: ${{ inputs.mechanics }}
      PLAYGEN_PHASE: ${{ inputs.phase }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Install Claude Code binary
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "CLAUDE_CODE_BIN=$(which claude)" >> "$GITHUB_ENV"
      - name: Run orchestrator
        id: run
        run: |
          if [ "${{ inputs.phase }}" = "build" ]; then
            npm run new -- "${{ inputs.premise }}" --modes ${{ inputs.modes }} --phase build --slug "${{ inputs.slug }}"
          else
            npm run new -- "${{ inputs.premise }}" --modes ${{ inputs.modes }} --phase "${{ inputs.phase }}"
          fi
      - name: Publish artifacts
        run: |
          if [ "${{ inputs.phase }}" = "plan" ]; then
            npm run publish:plan -- "${{ steps.run.outputs.slug }}"
          else
            npm run publish:slice -- "${{ steps.run.outputs.slug }}"
          fi
      - name: Commit artifacts
        id: commit
        run: |
          git config user.name "playgen-bot"
          git config user.email "playgen-bot@users.noreply.github.com"
          git add webapp/public/slices.json webapp/public/slices/
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to commit."
          else
            git commit -m "Generated slice: ${{ steps.run.outputs.slug }}"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: generate
    if: needs.generate.outputs.committed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - run: npm ci
        working-directory: webapp
      - run: npm run build
        working-directory: webapp
        env:
          VITE_DISPATCH_URL: ${{ vars.VITE_DISPATCH_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist
      - id: deployment
        uses: actions/deploy-pages@v4
