<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>PlayGen — physics vehicle</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #04060c;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #d6e4ff;
        font:
          12px/1.4 ui-monospace,
          monospace;
        background: rgba(8, 12, 24, 0.6);
        border: 1px solid rgba(180, 200, 255, 0.18);
        border-radius: 4px;
        padding: 8px 12px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
